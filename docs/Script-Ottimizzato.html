const checkState = {};
const TIMER_DURATION = 4 * 60;
let timerStarted = false, timerDone = false, timerElapsed = 0, timerInterval = null;

function startTimer() {
  if (timerStarted) return;
  timerStarted = true;
  document.getElementById('timer-bar').style.display = 'flex';
  document.getElementById('timer-bar').classList.add('running');
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerElapsed++;
    updateTimerDisplay();
    updateNextBtn();
    if (timerElapsed >= TIMER_DURATION) {
      clearInterval(timerInterval);
      timerDone = true;
      document.getElementById('timer-bar').classList.remove('running');
      document.getElementById('timer-bar').classList.add('done');
      document.getElementById('timer-ring').classList.add('done');
      document.getElementById('timer-label').textContent = 'Tempo raggiunto — puoi procedere al pitch';
      updateNextBtn();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const remaining = Math.max(0, TIMER_DURATION - timerElapsed);
  const m = Math.floor(remaining / 60);
  const s = remaining % 60;
  document.getElementById('timer-display').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  const pct = Math.min(timerElapsed / TIMER_DURATION, 1);
  const circumference = 2 * Math.PI * 15;
  document.getElementById('timer-arc').style.strokeDasharray = circumference;
  document.getElementById('timer-arc').style.strokeDashoffset = circumference * (1 - pct);
}

const STORAGE_KEY = 'script_fenice_ottimizzato_v2';

function saveBlocks(b) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(b)); } catch(e) {} }

  const counterEl = document.createElement('div');
  counterEl.className = 'checklist-counter';
  counterEl.id = `counter-${blockIdx}`;
  card.appendChild(counterEl);
  updateCounter(blockIdx);
  // Add voice note from text if present
  const textContent = blocks[blockIdx].text;
  const voiceMatch = textContent.match(/<div class='voice-note'>[\s\S]*?<\/div>/);
  if (voiceMatch) {
    const noteDiv = document.createElement('div');
    noteDiv.innerHTML = voiceMatch[0];
    card.appendChild(noteDiv.firstChild);
  }
  cfg.sections.forEach((sec, si) => {
    const secDiv = document.createElement('div');
    secDiv.className = 'checklist-section';
    secDiv.innerHTML = `<div class="checklist-section-title">${sec.title}</div>`;
    sec.items.forEach((item, ii) => {
      const key = `${si}-${ii}`;
      const row = document.createElement('div');
      row.className = 'check-item' + (state.has(key) ? ' checked' : '');
      const id = `chk-${blockIdx}-${si}-${ii}`;
      row.innerHTML = `<input type="checkbox" id="${id}" ${state.has(key) ? 'checked' : ''}><label for="${id}">${item}</label>`;
      row.querySelector('input').addEventListener('change', e => {
        e.stopPropagation();
        if (e.target.checked) { state.add(key); row.classList.add('checked'); }
        else { state.delete(key); row.classList.remove('checked'); }
        updateCounter(blockIdx);
        updateNextBtn();
      });
      row.addEventListener('click', e => { if (e.target.tagName !== 'INPUT') row.querySelector('input').click(); });
      secDiv.appendChild(row);
    });
    card.appendChild(secDiv);
  });
}

function updateCounter(blockIdx) {
  const cfg = CHECKLISTS[blockIdx];
  const state = checkState[blockIdx] || new Set();
  const el = document.getElementById(`counter-${blockIdx}`);
  if (!el) return;
  el.textContent = `${state.size} / ${cfg.min}`;
  el.className = 'checklist-counter ' + (state.size >= cfg.min ? 'ok' : 'warn');
}

function isBlockLocked(currentIdx, destIdx) {
  if (CHECKLISTS[currentIdx]) {
    const state = checkState[currentIdx] || new Set();
    if (state.size < CHECKLISTS[currentIdx].min) return 'checklist';
  }
  if (destIdx >= 8 && !timerDone) return 'timer';
  return false;
}

function updateNextBtn() {
  nextBtn.disabled = current === blocks.length - 1;
  const lock = isBlockLocked(current, current + 1);
  if (lock === 'checklist') {
    nextBtn.classList.add('blocked');
    nextBtn.title = `Spunta almeno ${CHECKLISTS[current].min} domande per continuare`;
  } else if (lock === 'timer') {
    nextBtn.classList.add('blocked');
    const r = Math.max(0, TIMER_DURATION - timerElapsed);
    nextBtn.title = `Attendere ancora ${Math.floor(r/60)}:${(r%60).toString().padStart(2,'0')} prima del pitch`;
  } else {
    nextBtn.classList.remove('blocked');
    nextBtn.title = '';
  }
}

function buildCards() {
  wrap.innerHTML = '';
  blocks.forEach((b, i) => {
    const card = document.createElement('div');
    card.className = 'block-card' + (i === 0 ? ' active' : '');
    card.dataset.idx = i;
    if (CHECKLISTS[i]) {
      buildChecklistCard(i, card);
    } else {
      card.innerHTML = `<div class="block-title">${b.title}</div><div class="block-text">${b.text.replace(/\n/g, '<br>')}</div>`;
    }
    wrap.appendChild(card);
  });
  wrap.style.height = wrap.querySelector('.active').scrollHeight + 'px';
}

function goTo(idx) {
  if (idx < 0 || idx >= blocks.length || idx === current) return;
  const lock = isBlockLocked(current, idx);
  if (lock && idx > current) return;
  const cards = wrap.querySelectorAll('.block-card');
  cards[current].classList.remove('active');
  cards[current].style.transform = idx > current ? 'translateX(-60px)' : 'translateX(60px)';
  current = idx;
  cards[current].style.transform = idx > current - 1 ? 'translateX(60px)' : 'translateX(-60px)';
  requestAnimationFrame(() => {
    cards[current].classList.add('active');
    wrap.style.height = cards[current].scrollHeight + 'px';
  });
  counter.textContent = `${current + 1} / ${blocks.length}`;
  fill.style.width = `${((current + 1) / blocks.length) * 100}%`;
  prevBtn.disabled = current === 0;
  updateNextBtn();
  if (current >= 1 && !timerStarted) startTimer();
}

prevBtn.addEventListener('click', () => goTo(current - 1));
nextBtn.addEventListener('click', () => goTo(current + 1));
document.getElementById('new-call-btn').addEventListener('click', () => {
  Object.keys(checkState).forEach(k => checkState[k].clear());
  timerStarted = false; timerDone = false; timerElapsed = 0;
  if (timerInterval) clearInterval(timerInterval);
  document.getElementById('timer-bar').style.display = 'none';
  document.getElementById('timer-bar').className = '';
  document.getElementById('timer-ring').classList.remove('done');
  current = 0;
  buildCards();
  counter.textContent = `1 / ${blocks.length}`;
  fill.style.width = '9%';
  prevBtn.disabled = true;
  updateNextBtn();
});

buildCards();
updateNextBtn();
</script>
</body>
</html>
